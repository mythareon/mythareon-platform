version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mythareon-postgres
    environment:
      POSTGRES_USER: mythareon
      POSTGRES_PASSWORD: mythareon_dev
      POSTGRES_DB: mythareon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mythareon"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mythareon

  redis:
    image: redis:7-alpine
    container_name: mythareon-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mythareon

volumes:
  postgres_data:
  redis_data:

networks:
  mythareon:
    driver: bridge
